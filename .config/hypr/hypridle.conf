general {
    lock_cmd = hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 3
}

# Start screensaver
listener {
    timeout = 150
    on-timeout = pidof hyprlock || omarchy-launch-screensaver --random-effect
}

# Screen off later
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprlock
}


